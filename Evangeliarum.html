    <style>
        /* Base Dark Medieval styling */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Charcoal/Dark backdrop for the 4 outer quadrants */
            background-color: #0a0303; 
            color: #d4af37; /* Warm Gold */
            font-family: 'Georgia', 'Times New Roman', serif;
            box-sizing: border-box;
        }

        /* NEW Scroll Wrapper with Background Red Cross */
        .scroll-wrapper {
            position: relative;
            display: flex;
            justify-content: flex-start;
            width: 100%;
            min-height: 100vh;
            overflow-x: auto;
            overflow-y: auto;
            padding: 20px 0;
            box-sizing: border-box;
        }

        /* 
           Background Cross Construction:
           ::before creates the Horizontal Red Beam
           ::after creates the Vertical Red Beam
        */
        .scroll-wrapper::before,
        .scroll-wrapper::after {
            content: "";
            position: absolute;
            /* Deep blood-red gradient for the cross body */
            background: radial-gradient(circle, #4a0d0d 0%, #2b0808 70%, #1a0404 100%);
            z-index: 0; /* Keeps the cross BEHIND the text and images */
            pointer-events: none;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.9);
        }

        /* Horizontal Beam of the Cross (spans left to right behind Marek & Ján) */
        .scroll-wrapper::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 380px; /* Sized to cushion the left/right blocks and icon */
            transform: translateY(-50%);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* Vertical Beam of the Cross (spans top to bottom behind Matúš & Lukáš) */
        .scroll-wrapper::after {
            left: 50%;
            top: 0;
            width: 380px; /* Sized to cushion the top/bottom blocks and icon */
            height: 100%;
            transform: translateX(-50%);
            border-left: 1px solid rgba(212, 175, 55, 0.2);
            border-right: 1px solid rgba(212, 175, 55, 0.2);
        }

        @media (min-width: 960px) {
            .scroll-wrapper {
                justify-content: center;
            }
        }

        /* Central Layout Wrapper - FORCED FIXED CROSS LAYOUT */
        .evangelium-container {
            position: relative;
            z-index: 1; /* Places interactive elements ABOVE the background cross */
            display: grid;
            grid-template-areas: 
                ".       top     ."
                "left    center  right"
                ".       bottom  .";
            grid-template-columns: 280px 320px 280px;
            grid-template-rows: auto auto auto;
            gap: 20px;
            width: 920px;
            padding: 20px;
            align-items: center;
            justify-items: center;
            margin: auto 0; 
        }

        @media (min-width: 960px) {
            .evangelium-container {
                margin: auto;
            }
        }

        /* The Holy Icon wrapper */
        .center-image {
            grid-area: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-image img {
            max-height: 320px;
            width: auto;
            border: 3px solid #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            border-radius: 4px;
        }

        /* Gospel Category blocks with translucent backgrounds showing the red cross underneath */
        .gospel-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(15, 5, 5, 0.85); /* Darkened slightly to keep Roman numerals legible */
            border: 1px solid rgba(212, 175, 55, 0.35);
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(2px);
        }

        .gospel-title {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #f1e5c2;
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            padding-bottom: 5px;
            width: 100%;
            text-align: center;
        }

        /* Grid for Roman numerals */
        .chapters-grid {
            display: grid;
            gap: 6px 10px;
            justify-content: center;
            width: 100%;
        }

        /* Horizontal/Vertical locked specific adjustments */
        .top-block { 
            grid-area: top; 
            width: 100%;
        }
        .top-block .chapters-grid { 
            grid-template-columns: repeat(7, 1fr); 
        }

        .bottom-block { 
            grid-area: bottom; 
            width: 100%;
        }
        .bottom-block .chapters-grid { 
            grid-template-columns: repeat(6, 1fr); 
        }

        .left-block { 
            grid-area: left; 
        }
        .left-block .chapters-grid { 
            grid-template-columns: repeat(4, 1fr); 
        }

        .right-block { 
            grid-area: right; 
        }
        .right-block .chapters-grid { 
            grid-template-columns: repeat(4, 1fr); 
        }

        /* Hyperlink styling */
        .chapters-grid a {
            color: #bfa15f;
            text-decoration: none;
            font-size: 0.95rem;
            text-align: center;
            padding: 3px;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .chapters-grid a:hover {
            color: #ffffff;
            background-color: rgba(212, 175, 55, 0.35);
            transform: scale(1.15);
            text-shadow: 0 0 5px #fff;
        }
    </style>
