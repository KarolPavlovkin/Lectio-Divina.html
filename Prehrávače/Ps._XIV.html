<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prehrávač - Ps. XIV</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-image: url("../assets/pictura/Prima.jpg");
            padding: 20px;
        }
        .player-container {
            background-image: url("../assets/pictura/Crack.jpg");
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 90%;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        .button-group {
            display: flex;
            justify-content: space-between; /* This pushes left to the left, right to the right */
            align-items: center;
            margin-top: 20px;
            width: 100%;
        }

        /* Shared style for both navigation buttons */
        .nav-btn {
            text-decoration: none;
             color: #36454F;
            font-weight: bold;
            font-size: 14px;
        }

        /* Explicit alignment just to be completely safe */
        .btn-left {
            text-align: left;
        }

        .btn-right {
            text-align: right;
        }
    </style>
</head>
<body>

<div class="player-container">
    <img src="../assets/pictura/XIV.jpg" alt="Ilustrácia k žalmu">
    
    
    <h2>Psalmus XIV</h2>

    <audio id="my-audio" controls preload="auto" autoplay>
        <source src="../assets/audio/Ps._XIV-Domino,_Quis_Habitabit.mp3" type="audio/mp3">
        toto.
    </audio>
    
    <br>
    <div class="button-group">
        <a href="../Opus-Dei.html" class="nav-btn btn-left">◀ ▃▅▇  </a>
        <a id="next-btn" href="../Next-Page.html" class="nav-btn btn-right">▃▅▇ ▶</a>
    </div>
</div>
<script>
    const audio = document.getElementById('my-audio');
    const nextButton = document.getElementById('next-btn');

    // 1. Play audio automatically when the page is opened
    window.addEventListener('DOMContentLoaded', () => {
        audio.play().catch(error => {
            console.log("Autoplay blocked. It will start playing once you interact with the page once.");
        });
    });

    // 2. Go to the next page when the audio ends
    audio.addEventListener('ended', function() {
        if (nextButton) {
            nextButton.click();
        }
    });
</script>

</body>
</html>
