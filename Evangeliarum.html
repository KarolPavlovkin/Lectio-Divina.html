<!DOCTYPE html>

    <title>Evangeliarum</title>
    <style>
        /* Base Dark Medieval styling with deep reddish background */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Rich, deep blood-red to dark charcoal radial gradient */
            background: radial-gradient(circle, #2b0808 0%, #0d0303 100%);
            color: #d4af37; /* Warm Gold */
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            /* Allow scrollbars if the fixed-size cross is wider/taller than the screen */
            overflow: auto; 
        }

        /* Central Layout Wrapper - FORCED FIXED CROSS LAYOUT */
        .evangelium-container {
            display: grid;
            grid-template-areas: 
                ".       top     ."
                "left    center  right"
                ".       bottom  .";
            /* Fixed columns to prevent breaking the cross shape on Android */
            grid-template-columns: 280px 320px 280px;
            grid-template-rows: auto auto auto;
            gap: 20px;
            width: 920px; /* Locked width to guarantee the cross layout on any screen */
            padding: 40px 20px;
            align-items: center;
            justify-items: center;
            margin: auto;
        }

        /* The Holy Icon wrapper */
        .center-image {
            grid-area: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-image img {
            max-height: 320px; /* Slightly adjusted to fit nicely within the fixed grid */
            width: auto;
            border: 3px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            border-radius: 4px;
        }

        /* Gospel Category blocks with darker, red-tinted translucent backgrounds */
        .gospel-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(22, 11, 11, 0.9); /* Dark reddish-black */
            border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            width: 100%;
            box-sizing: border-box;
        }

        .gospel-title {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #f1e5c2;
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            padding-bottom: 5px;
            width: 100%;
            text-align: center;
        }

        /* Grid for Roman numerals */
        .chapters-grid {
            display: grid;
            gap: 6px 10px;
            justify-content: center;
            width: 100%;
        }

        /* Horizontal/Vertical locked specific adjustments */
        .top-block { 
            grid-area: top; 
            width: 100%;
        }
        .top-block .chapters-grid { 
            grid-template-columns: repeat(7, 1fr); 
        }

        .bottom-block { 
            grid-area: bottom; 
            width: 100%;
        }
        .bottom-block .chapters-grid { 
            grid-template-columns: repeat(6, 1fr); 
        }

        .left-block { 
            grid-area: left; 
        }
        .left-block .chapters-grid { 
            grid-template-columns: repeat(4, 1fr); 
        }

        .right-block { 
            grid-area: right; 
        }
        .right-block .chapters-grid { 
            grid-template-columns: repeat(4, 1fr); 
        }

        /* Hyperlink styling */
        .chapters-grid a {
            color: #bfa15f;
            text-decoration: none;
            font-size: 0.95rem;
            text-align: center;
            padding: 3px;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .chapters-grid a:hover {
            color: #ffffff;
            background-color: rgba(212, 175, 55, 0.25);
            transform: scale(1.15);
            text-shadow: 0 0 5px #fff;
        }
    </style>
</head>
