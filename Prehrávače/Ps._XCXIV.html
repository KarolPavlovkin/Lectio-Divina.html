<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/psalmus.css">

    <style>
        body { background-image: url("../assets/pictura/Matutinuum.jpg"); }
    </style>
</head>

<body>

<div class="player-container">
    <img src="../assets/pictura/XCIV.jpg" alt="Ilustrácia k žalmu">
    
    <h2>Psalmus XCIV: Venite, Exceltemus Domino</h2>

    <audio id="my-audio" controls preload="auto" autoplay>
        <source src="../assets/audio/Ps._XCIVb-Venite,_Excelmus_Domino.mp3" type="audio/mp3">
        toto.
    </audio>
  
    <audio controls preload="auto">

    <br>
    <div class="button-group">

    </div>
</div>

<script>
    const audio = document.getElementById('my-audio');
    const nextButton = document.getElementById('next-btn');

    // 1. Play audio automatically when the page is opened
    window.addEventListener('DOMContentLoaded', () => {
        audio.play().catch(error => {
            console.log("Autoplay blocked. It will start playing once you interact with the page once.");
        });
    });

    // 2. Go to the next page when the audio ends
    audio.addEventListener('ended', function() {
        if (nextButton) {
            nextButton.click();
        }
    });
</script>
