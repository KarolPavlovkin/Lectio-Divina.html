    <style>
        /* Base Dark Medieval styling */
html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background-color: #0a0303; 
    color: #d4af37;
    font-family: 'Georgia', 'Times New Roman', serif;
    box-sizing: border-box;
    overflow-x: hidden; /* Prevents horizontal scroll breaking the cross */
}

/* Page Wrapper with Dynamic Red Cross */
.scroll-wrapper {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    min-height: 100vh;
    padding: 20px 10px;
    box-sizing: border-box;
}

/* 
   Background Cross:
   Uses % relative sizes so it stays perfectly aligned on screens of ANY size.
*/
.scroll-wrapper::before,
.scroll-wrapper::after {
    content: "";
    position: absolute;
    background: radial-gradient(circle, #4a0d0d 0%, #2b0808 70%, #1a0404 100%);
    z-index: 0;
    pointer-events: none;
    box-shadow: 0 0 35px rgba(0, 0, 0, 0.9);
}

/* Horizontal Beam */
.scroll-wrapper::before {
    top: 50%;
    left: 0;
    width: 100%;
    height: clamp(220px, 35vh, 380px); /* Scales down fluidly on small screens */
    transform: translateY(-50%);
    border-top: 1px solid rgba(212, 175, 55, 0.2);
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

/* Vertical Beam */
.scroll-wrapper::after {
    left: 50%;
    top: 0;
    width: clamp(260px, 75vw, 380px); /* Scales proportionally to mobile width */
    height: 100%;
    transform: translateX(-50%);
    border-left: 1px solid rgba(212, 175, 55, 0.2);
    border-right: 1px solid rgba(212, 175, 55, 0.2);
}

/* Central Layout Wrapper */
.evangelium-container {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-areas: 
        ".       top     ."
        "left    center  right"
        ".       bottom  .";
    /* Dynamic scaling columns instead of fixed pixels */
    grid-template-columns: minmax(80px, 1fr) minmax(140px, 320px) minmax(80px, 1fr);
    grid-template-rows: auto auto auto;
    gap: 10px;
    width: 100%;
    max-width: 920px;
    align-items: center;
    justify-items: center;
    box-sizing: border-box;
}

/* Central Image Adjustments for Mobile */
.center-image {
    grid-area: center;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.center-image img {
    max-height: clamp(160px, 30vh, 320px); /* Scales smaller on Android screens */
    width: auto;
    max-width: 100%;
    border: 3px solid #d4af37;
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
    border-radius: 4px;
}

/* Gospel Category blocks */
.gospel-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(15, 5, 5, 0.9);
    border: 1px solid rgba(212, 175, 55, 0.35);
    padding: 8px;
    border-radius: 6px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
    width: 100%;
    box-sizing: border-box;
}

.gospel-title {
    font-size: clamp(0.9rem, 3vw, 1.4rem);
    margin: 0 0 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #f1e5c2;
    border-bottom: 1px solid rgba(212, 175, 55, 0.4);
    padding-bottom: 3px;
    width: 100%;
    text-align: center;
}

/* Grid for Roman numerals */
.chapters-grid {
    display: grid;
    gap: 4px;
    justify-content: center;
    width: 100%;
}

/* Column behavior on smaller viewports */
.top-block { grid-area: top; width: 100%; }
.top-block .chapters-grid { grid-template-columns: repeat(7, 1fr); }

.bottom-block { grid-area: bottom; width: 100%; }
.bottom-block .chapters-grid { grid-template-columns: repeat(6, 1fr); }

.left-block { grid-area: left; width: 100%; }
.left-block .chapters-grid { grid-template-columns: repeat(2, 1fr); } /* 2 cols on mobile for left arm */

.right-block { grid-area: right; width: 100%; }
.right-block .chapters-grid { grid-template-columns: repeat(2, 1fr); } /* 2 cols on mobile for right arm */

/* On Desktop screens, expand side blocks to 4 columns */
@media (min-width: 768px) {
    .gospel-block { padding: 15px; }
    .chapters-grid { gap: 6px 10px; }
    .left-block .chapters-grid,
    .right-block .chapters-grid { 
        grid-template-columns: repeat(4, 1fr); 
    }
}

/* Hyperlink styling */
.chapters-grid a {
    color: #bfa15f;
    text-decoration: none;
    font-size: clamp(0.7rem, 2.2vw, 0.95rem);
    text-align: center;
    padding: 2px;
    border-radius: 3px;
    transition: all 0.2s ease;
}

.chapters-grid a:hover {
    color: #ffffff;
    background-color: rgba(212, 175, 55, 0.35);
    text-shadow: 0 0 5px #fff;
}
